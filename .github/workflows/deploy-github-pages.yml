name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pathwise/shared build

      - name: Export static web app
        env:
          GITHUB_PAGES: 'true'
          NEXT_BASE_PATH: /pathwise
          NEXT_PUBLIC_APP_URL: https://mahdi-habibi.github.io/pathwise
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DEMO_MODE: ${{ vars.NEXT_PUBLIC_API_URL == '' && 'true' || 'false' }}
        run: pnpm --filter @pathwise/web build

      - name: Ensure .nojekyll (GitHub Pages must not ignore _next)
        run: touch apps/web/out/.nojekyll

      - name: Upload Pages artifact (for Source = GitHub Actions)
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - name: Publish to gh-pages branch (for Source = Deploy from a branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/out
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false

  deploy:
    name: Deploy to GitHub Pages (Actions source)
    needs: build
    # Succeeds only when repo Settings → Pages → Source is "GitHub Actions".
    # If Source is still "Deploy from a branch" / gh-pages, the branch publish above is enough.
    continue-on-error: true
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
