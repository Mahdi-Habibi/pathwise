name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pathwise
          POSTGRES_PASSWORD: pathwise
          POSTGRES_DB: pathwise
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pathwise -d pathwise"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://pathwise:pathwise@localhost:5432/pathwise?schema=public
      JWT_SECRET: ci-jwt-secret-change-me-use-at-least-32-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me-use-32-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      PORT: 3001
      NODE_ENV: test
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      API_PROXY_TARGET: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pathwise/shared build

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build
