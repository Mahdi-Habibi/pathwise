# Deploy Pathwise using images published to GitHub Container Registry.
#
# Prerequisites:
#   1. Copy .env.docker.example → .env.docker and set production secrets
#   2. Authenticate: echo $GITHUB_TOKEN | docker login ghcr.io -u USERNAME --password-stdin
#   3. Export owner (lowercase): export GHCR_OWNER=your-github-username
#
# Start:
#   docker compose -f docker-compose.ghcr.yml --env-file .env.docker up -d

name: pathwise

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pathwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pathwise}
      POSTGRES_DB: ${POSTGRES_DB:-pathwise}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pathwise} -d ${POSTGRES_DB:-pathwise}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    image: ghcr.io/${GHCR_OWNER:?Set GHCR_OWNER to your lowercase GitHub username or org}/pathwise-api:${PATHWISE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pathwise:pathwise@postgres:5432/pathwise?schema=public}
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-use-a-different-long-string}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SEED_DATABASE: ${SEED_DATABASE:-false}
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: ${POSTGRES_USER:-pathwise}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - '${API_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/${GHCR_OWNER:?Set GHCR_OWNER to your lowercase GitHub username or org}/pathwise-web:${PATHWISE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: 0.0.0.0
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3001}
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - api

volumes:
  pgdata:
